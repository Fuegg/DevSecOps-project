name: WordPress Secu

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  wpscan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start WordPress stack
        run: |
          docker compose -f docker/docker-compose.yml up -d

      - name: Wait for WordPress to be fully ready
        run: |
          echo "Waiting for WordPress..."

          for i in {1..60}; do
            STATUS=$(curl -sL -w "%{http_code}" -o /dev/null http://localhost:8080 || true)
            if [ "$STATUS" = "200" ]; then
              echo "WordPress is READY"
              exit 0
            fi
            sleep 5
          done

          echo "WordPress did not start properly"
          docker ps
          docker compose -f docker/docker-compose.yml logs
          exit 1

      - name: Initialize WordPress installation
        run: |
          echo "Initializing WordPress site configuration..."

          curl -s -X POST \
            -d "weblog_title=CI-Security-Test" \
            -d "user_name=cyber_secure_user" \
            -d "admin_password=bIE5QDgtN0VDx2fd2Kx*3X12vf" \
            -d "admin_password2=bIE5QDgtN0VDx2fd2Kx*3X12vf" \
            -d "admin_email=ci-project@gmail.com" \
            -d "blog_public=1" \
            -d "Submit=Install WordPress" \
            "http://localhost:8080/wp-admin/install.php?step=2"

          echo "WordPress installation completed."
      - name: Allow extra boot time (stabilisation CI)
        run: sleep 20

      - name: Run WPScan
        run: |
          mkdir -p scans

          docker run --rm --network host wpscan/wpscan \
          --url http://localhost:8080 \
          --enumerate u,vp,vt \
          --format cli \
          --no-update \
          --api-token "${{ secrets.WPSCAN_API_TOKEN }}" \
          | tee scans/wpscan.txt

      - name: Upload WPScan report
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-report
          path: scans/

      - name: Stop containers
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml down
  publish:
    runs-on: ubuntu-latest
    needs: wpscan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        run: |
          docker build -t wp-secure:latest -f docker/wordpress/Dockerfile docker/

          IMAGE_NAME="devsecops-wordpress"
          DOCKERHUB_REPO="${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME"
          GHCR_REPO="ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME"

          GHCR_REPO=$(echo "$GHCR_REPO" | tr '[:upper:]' '[:lower:]')

          docker tag wp-secure:latest $DOCKERHUB_REPO:latest
          docker tag wp-secure:latest $GHCR_REPO:latest

          docker push $DOCKERHUB_REPO:latest
          docker push $GHCR_REPO:latest

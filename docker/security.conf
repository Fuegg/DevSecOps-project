<Files xmlrpc.php>
    Order Allow,Deny
    Deny from all
</Files>

<Files readme.html>
    Order Allow,Deny
    Deny from all
</Files>

ServerTokens ProductOnly
ServerSignature Off

RedirectMatch 403 /wp-json/wp/v2/users
RedirectMatch 403 /feed/
RedirectMatch 403 /comments/feed/
RedirectMatch 403 /wp-sitemap-users-1.xml
RedirectMatch 403 /author/.*
RedirectMatch 404 /robots\.txt

RewriteEngine On
RewriteCond %{QUERY_STRING} author= [NC]
RewriteRule ^ - [F,L]

<Files wp-cron.php>
    Order Allow,Deny
    Deny from all
</Files>
